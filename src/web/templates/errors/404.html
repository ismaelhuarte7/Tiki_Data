{% extends "layout.html" %}

{% block title %}Error 404 - Página no encontrada{% endblock %}

{% block content %}
<div class="container error-page-wrap">
    <div class="row justify-content-center">
        <div class="col-md-9 col-lg-8">
            <div class="card error-page-card text-center">
                <div class="card-body py-5 px-4 px-md-5">
                    <div class="mb-4">
                        <i class="bi bi-exclamation-triangle-fill error-page-icon error-page-icon-404"></i>
                    </div>
                    <h1 class="error-page-code">Error 404</h1>
                    <p class="error-page-lead">La página que estás buscando no existe.</p>
                    <p class="error-page-copy">Puede que la página haya sido eliminada o que exista un error en la URL ingresada.</p>
                    <a href="{{ url_for('home') }}" class="btn btn-primary btn-lg mt-3 error-page-btn">
                        <i class="bi bi-house-door-fill me-2"></i>Volver al inicio
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
