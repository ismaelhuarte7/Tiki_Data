{% extends "layout.html" %}

{% block title %}Iniciar Sesión - Tiki-Data{% endblock %}

{% block content %}
<div class="container auth-page auth-page-login">
    <div class="row justify-content-center">
        <div class="col-12">
            <div class="card auth-card fade-in-up">
                <!-- Header -->
                <div class="card-header text-center py-3 auth-card-header">
                    <h2 class="mb-0 auth-title">
                        <i class="bi bi-box-arrow-in-right me-2 auth-title-icon"></i>
                        Iniciar Sesión
                    </h2>
                    <p class="mb-0 mt-2 auth-subtitle">Accede a tu cuenta de Tiki-Data</p>
                </div>
                
                <div class="card-body p-4">
                    <form method="POST" action="{{ url_for('auth.login') }}" class="needs-validation" novalidate>
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
                        <!-- Usuario -->
                        <div class="mb-3">
                            <label for="username" class="form-label auth-label">
                                <i class="bi bi-person-circle me-1"></i>Usuario
                            </label>
                            <input 
                                type="text" 
                                class="form-control form-control-lg auth-control" 
                                id="username" 
                                name="username" 
                                placeholder="Ingresa tu usuario" 
                                required 
                                autofocus>
                            <div class="invalid-feedback">Por favor, ingresa tu usuario.</div>
                        </div>
                        
                        <!-- Contraseña -->
                        <div class="mb-4">
                            <label for="password" class="form-label auth-label">
                                <i class="bi bi-lock-fill me-1"></i>Contraseña
                            </label>
                            <div class="input-group auth-password-group">
                                <input 
                                    type="password" 
                                    class="form-control form-control-lg auth-control" 
                                    id="password" 
                                    name="password" 
                                    placeholder="Tu contraseña" 
                                    required>
                                <button 
                                    class="btn auth-toggle-btn" 
                                    type="button" 
                                    id="togglePassword">
                                    <i class="bi bi-eye auth-toggle-icon" id="toggleIcon"></i>
                                </button>
                            </div>
                            <div class="invalid-feedback">Por favor, ingresa tu contraseña.</div>
                        </div>
                        
                        <!-- Botón de login -->
                        <div class="d-grid mb-3">
                            <button type="submit" class="btn btn-primary btn-lg">
                                <i class="bi bi-box-arrow-in-right me-2"></i>
                                Iniciar Sesión
                            </button>
                        </div>
                        
                        <!-- Divider -->
                        <div class="text-center mb-3">
                            <div class="auth-divider">
                                <div class="auth-divider-line"></div>
                                <span class="auth-divider-text">O</span>
                                <div class="auth-divider-line"></div>
                            </div>
                        </div>
                        
                        <!-- Link a registro -->
                        <div class="text-center">
                            <p class="mb-0 auth-link-copy">
                                ¿No tienes una cuenta? 
                                <a href="{{ url_for('auth.signup') }}" class="text-decoration-none auth-link-cta">
                                    Regístrate aquí
                                </a>
                            </p>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // Toggle password visibility
    document.getElementById('togglePassword').addEventListener('click', function() {
        const passwordInput = document.getElementById('password');
        const toggleIcon = document.getElementById('toggleIcon');
        
        if (passwordInput.type === 'password') {
            passwordInput.type = 'text';
            toggleIcon.classList.remove('bi-eye');
            toggleIcon.classList.add('bi-eye-slash');
        } else {
            passwordInput.type = 'password';
            toggleIcon.classList.remove('bi-eye-slash');
            toggleIcon.classList.add('bi-eye');
        }
    });

    // Input group focus effect
    const passwordInput = document.getElementById('password');
    const inputGroup = passwordInput.closest('.input-group');
    
    passwordInput.addEventListener('focus', function() {
        inputGroup.classList.add('is-focused');
    });
    
    passwordInput.addEventListener('blur', function() {
        inputGroup.classList.remove('is-focused');
    });

    // Form validation
    const form = document.querySelector('.needs-validation');
    form.addEventListener('submit', function(event) {
        if (!form.checkValidity()) {
            event.preventDefault();
            event.stopPropagation();
        }
        form.classList.add('was-validated');
    }, false);
</script>
{% endblock %}
