{% extends "layout.html" %}

{% block title %}Iniciar Sesión - Tiki-Data{% endblock %}

{% block content %}
<div class="container" style="max-width: 500px; margin-top: 4rem; margin-bottom: 4rem;">
    <div class="row justify-content-center">
        <div class="col-12">
            <div class="card fade-in">
                <!-- Header -->
                <div class="card-header text-center py-3" style="background: linear-gradient(135deg, var(--bg-secondary), var(--bg-card)); border-bottom: 2px solid var(--primary);">
                    <h2 class="mb-0" style="font-weight: 700; letter-spacing: -0.02em; font-size: 1.75rem; color: var(--text-primary);">
                        <i class="bi bi-box-arrow-in-right me-2" style="color: var(--primary);"></i>
                        Iniciar Sesión
                    </h2>
                    <p class="mb-0 mt-2" style="color: #8b95a8; font-size: 0.95rem;">Accede a tu cuenta de Tiki-Data</p>
                </div>
                
                <div class="card-body p-4">
                    <form method="POST" action="{{ url_for('auth.login') }}" class="needs-validation" novalidate>
                        <!-- Usuario -->
                        <div class="mb-3">
                            <label for="username" class="form-label" style="color: var(--text-primary); font-weight: 600; font-size: 0.95rem;">
                                <i class="bi bi-person-circle me-1"></i>Usuario
                            </label>
                            <input 
                                type="text" 
                                class="form-control form-control-lg" 
                                id="username" 
                                name="username" 
                                placeholder="Ingresa tu usuario" 
                                required 
                                autofocus
                                style="padding: 0.75rem 1rem; font-size: 1rem;">
                            <div class="invalid-feedback">Por favor, ingresa tu usuario.</div>
                        </div>
                        
                        <!-- Contraseña -->
                        <div class="mb-4">
                            <label for="password" class="form-label" style="color: var(--text-primary); font-weight: 600; font-size: 0.95rem;">
                                <i class="bi bi-lock-fill me-1"></i>Contraseña
                            </label>
                            <div class="input-group" style="border: 2px solid var(--border); border-radius: var(--radius-md); background: var(--bg-secondary); transition: var(--transition);">
                                <input 
                                    type="password" 
                                    class="form-control form-control-lg" 
                                    id="password" 
                                    name="password" 
                                    placeholder="Tu contraseña" 
                                    required
                                    style="padding: 0.75rem 1rem; font-size: 1rem; border: none; background: transparent;">
                                <button 
                                    class="btn" 
                                    type="button" 
                                    id="togglePassword"
                                    style="border: none; background: transparent; padding: 0 1rem;">
                                    <i class="bi bi-eye" id="toggleIcon" style="color: #8b95a8;"></i>
                                </button>
                            </div>
                            <div class="invalid-feedback">Por favor, ingresa tu contraseña.</div>
                        </div>
                        
                        <!-- Botón de login -->
                        <div class="d-grid mb-3">
                            <button type="submit" class="btn btn-primary btn-lg">
                                <i class="bi bi-box-arrow-in-right me-2"></i>
                                Iniciar Sesión
                            </button>
                        </div>
                        
                        <!-- Divider -->
                        <div class="text-center mb-3">
                            <div style="display: flex; align-items: center; text-align: center; margin: 0;">
                                <div style="flex: 1; border-bottom: 1px solid var(--border);"></div>
                                <span style="padding: 0 1rem; color: #8b95a8; font-size: 0.875rem;">O</span>
                                <div style="flex: 1; border-bottom: 1px solid var(--border);"></div>
                            </div>
                        </div>
                        
                        <!-- Link a registro -->
                        <div class="text-center">
                            <p class="mb-0" style="color: #8b95a8;">
                                ¿No tienes una cuenta? 
                                <a href="{{ url_for('auth.signup') }}" class="text-decoration-none" style="color: var(--primary); font-weight: 600;">
                                    Regístrate aquí
                                </a>
                            </p>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // Toggle password visibility
    document.getElementById('togglePassword').addEventListener('click', function() {
        const passwordInput = document.getElementById('password');
        const toggleIcon = document.getElementById('toggleIcon');
        
        if (passwordInput.type === 'password') {
            passwordInput.type = 'text';
            toggleIcon.classList.remove('bi-eye');
            toggleIcon.classList.add('bi-eye-slash');
        } else {
            passwordInput.type = 'password';
            toggleIcon.classList.remove('bi-eye-slash');
            toggleIcon.classList.add('bi-eye');
        }
    });

    // Input group focus effect
    const passwordInput = document.getElementById('password');
    const inputGroup = passwordInput.closest('.input-group');
    
    passwordInput.addEventListener('focus', function() {
        inputGroup.style.borderColor = 'var(--primary)';
        inputGroup.style.boxShadow = '0 0 0 4px rgba(0, 255, 136, 0.1)';
        inputGroup.style.transform = 'translateY(-2px)';
    });
    
    passwordInput.addEventListener('blur', function() {
        inputGroup.style.borderColor = 'var(--border)';
        inputGroup.style.boxShadow = 'none';
        inputGroup.style.transform = 'translateY(0)';
    });

    // Form validation
    const form = document.querySelector('.needs-validation');
    form.addEventListener('submit', function(event) {
        if (!form.checkValidity()) {
            event.preventDefault();
            event.stopPropagation();
        }
        form.classList.add('was-validated');
    }, false);
</script>

<style>
    .fade-in {
        animation: fadeInUp 0.6s ease;
    }
    
    @keyframes fadeInUp {
        from {
            opacity: 0;
            transform: translateY(30px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }
    
    .input-group .form-control:focus + .btn {
        border-color: var(--primary);
    }
</style>
{% endblock %}
